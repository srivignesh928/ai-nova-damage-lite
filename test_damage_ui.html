<!DOCTYPE html>
<html>
<head>
    <title>Damage Detection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        img { max-width: 300px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔍 Damage Detection Test</h1>
    
    <div class="section">
        <h2>Step 1: Upload Damage Image</h2>
        <input type="file" id="damageFile" accept="image/*">
        <div id="preview"></div>
    </div>
    
    <div class="section">
        <h2>Step 2: Analyze</h2>
        <button id="analyzeBtn" disabled>Analyze Damage</button>
        <div id="result"></div>
    </div>
    
    <div class="section">
        <h2>Console Logs</h2>
        <div id="logs" style="font-family: monospace; font-size: 12px;"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const damageFile = document.getElementById('damageFile');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const preview = document.getElementById('preview');
        const result = document.getElementById('result');
        const logs = document.getElementById('logs');
        
        function log(msg) {
            console.log(msg);
            logs.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        }
        
        damageFile.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                analyzeBtn.disabled = false;
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(e.target.files[0]);
                log('✅ File selected: ' + e.target.files[0].name);
            }
        });
        
        analyzeBtn.addEventListener('click', async () => {
            const file = damageFile.files[0];
            if (!file) return;
            
            log('🚀 Starting analysis...');
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';
            result.innerHTML = '';
            
            try {
                const formData = new FormData();
                formData.append('damage_image', file);
                
                log('📤 Sending to: ' + API_URL + '/damage/analyze');
                const response = await fetch(API_URL + '/damage/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                log('📥 Response status: ' + response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error('API error: ' + errorText);
                }
                
                const data = await response.json();
                log('✅ Success! Got response');
                
                result.className = 'result success';
                result.innerHTML = `
                    <h3>Analysis Result:</h3>
                    <p><strong>Has Damage:</strong> ${data.has_damage}</p>
                    <p><strong>Description:</strong> ${data.damage_description}</p>
                    <p><strong>Severity:</strong> ${data.severity}</p>
                    <p><strong>Issues:</strong> ${data.detected_issues.join(', ') || 'None'}</p>
                    <p><strong>Confidence:</strong> ${data.confidence}%</p>
                `;
                
            } catch (error) {
                log('❌ Error: ' + error.message);
                result.className = 'result error';
                result.innerHTML = `<strong>Error:</strong> ${error.message}`;
            }
            
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = 'Analyze Damage';
        });
        
        log('🎯 Test page loaded. Upload an image to start.');
    </script>
</body>
</html>
